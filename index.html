<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor ❤️</title>
    <!-- Importación de Fuentes y Animaciones -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com"/>
    
    <style>
        body { 
            background: #ffe5ec; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Quicksand', sans-serif; 
            overflow-x: hidden; 
            overflow-y: auto;
            transition: all 0.5s;
        }

        body.opened {
            align-items: flex-start;
            padding-top: 30px;
        }

        /* Caja de Regalo */
        .gift-container { text-align: center; position: relative; cursor: pointer; z-index: 10; display: block; }
        .gift-box { width: 120px; height: 120px; background: #ff4d6d; position: relative; margin: 0 auto; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .gift-box::before { content: ""; position: absolute; width: 20px; height: 100%; background: #fff; left: 50px; }
        .gift-box::after { content: ""; position: absolute; width: 100%; height: 20px; background: #fff; top: 50px; }
        .lid { width: 140px; height: 30px; background: #ff4d6d; position: absolute; top: -10px; left: -10px; border-radius: 5px; z-index: 2; border-bottom: 3px solid rgba(0,0,0,0.1); }
        
        /* Contenido Oculto */
        .content { display: none; width: 90%; max-width: 450px; text-align: center; padding-bottom: 50px; }
        
        h1 { 
            font-family: 'Dancing Script', cursive; 
            color: #c9184a; 
            font-size: 2.2rem; 
            margin-bottom: 10px;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto;
        }

        .opened h1 {
            animation: typing 3s steps(30, end) forwards;
            border-right: 3px solid #ff4d6d;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }

        #contador { color: #ff4d6d; font-weight: 700; margin: 15px 0; font-size: 1.1rem; }

        .photo-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .photo-gallery img { 
            width: 100%; height: 180px; object-fit: contain; 
            background: white; border-radius: 5px; border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .photo-gallery img:nth-child(odd) { transform: rotate(-2deg); }
        .photo-gallery img:nth-child(even) { transform: rotate(2deg); }
        .photo-gallery img:hover { transform: scale(1.1) rotate(0deg); z-index: 5; }

        .btn-love {
            background: #ff4d6d; color: white; border: none; padding: 12px 25px;
            border-radius: 25px; font-weight: bold; margin-top: 30px; cursor: pointer;
        }

        .btn-regresar {
            background: transparent; color: #ff4d6d; border: 2px solid #ff4d6d; padding: 8px 20px;
            border-radius: 20px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-regresar:hover { background: #ff4d6d; color: white; }

        /* Modal Personalizado */
        #miModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-body {
            background: #ffe5ec; padding: 30px; border-radius: 20px; text-align: center;
            max-width: 300px; border: 5px solid #ff4d6d; animation: heartBeat 1s;
        }

        .heart { position: absolute; color: #ff4d6d; animation: float 4s infinite linear; pointer-events: none; z-index: 100; }
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
        
        /* Control de estados */
        .opened .gift-container { display: none; }
        .opened .content { display: block; animation: fadeIn 2s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="body">

    <audio id="musica" loop>
        <source src="music/llegastes_tu.mp3" type="audio/mpeg">
    </audio>

    <div class="gift-container" id="giftSection" onclick="abrirRegalo()">
        <div class="gift-box"><div class="lid"></div></div>
        <p style="color: #c9184a; margin-top: 15px; font-weight: bold;">¡Toca tu regalo, amor! ✨</p>
    </div>

    <div class="content" id="contentSection">
        <h1>¡Feliz Cumpleaños, Amor! 🎂</h1>
        <div id="contador">Llevamos <span id="dias">0</span> días creando nuestra historia ❤️</div>
        <p style="color: #c9184a;">Eres mi persona favorita en el mundo entero. ❤️</p>
        
        <div class="photo-gallery">
            <img src="images/regalo1.jpeg" alt="foto1">
            <img src="images/amor.jpeg" alt="foto2">
            <img src="images/inicio.jpeg" alt="foto3">
            <img src="images/juntos1.jpeg" alt="foto4">
            <img src="images/juntos2.jpeg" alt="foto5">
            <img src="images/pedida.png" alt="foto6">
        </div>

        <button class="btn-love" onclick="superCorazones()">¡Presiona aquí! 💖</button>
        <br>
        <button class="btn-regresar" onclick="regresarAlInicio()">Regresar al regalo 🎁</button>
    </div>

    <!-- Modal Personalizado -->
    <div id="miModal">
        <div class="modal-body">
            <img src="images/amor.jpeg" style="width:100%; border-radius:15px; margin-bottom:15px;">
            <h2 style="color:#c9184a; font-family:'Dancing Script';">¡Te amo mi vida! 😍</h2>
            <p style="color:#c9184a;">Que tengas el mejor de los cumpleaños, mi niña hermosa.</p>
            <button onclick="cerrarModal()" style="background:#ff4d6d; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:bold;">Te amo ❤️</button>
        </div>
    </div>

    <script>
        let intervalCorazones;

        function abrirRegalo() {
            document.body.classList.add('opened'); 
            document.getElementById('musica').play();
            intervalCorazones = setInterval(createHeart, 300);
            calcularDias();
        }

        function regresarAlInicio() {
            // Quitamos la clase del body para centrar de nuevo
            document.body.classList.remove('opened');
            // Pausamos la música (opcional, si quieres que siga sonando quita la siguiente línea)
            document.getElementById('musica').pause();
            document.getElementById('musica').currentTime = 0;
            // Limpiamos el intervalo de corazones para que no se sature
            clearInterval(intervalCorazones);
            // Hacer scroll hacia arriba
            window.scrollTo(0, 0);
        }

        function calcularDias() {
            const fechaInicio = new Date('2023-12-29'); 
            const hoy = new Date();
            const dias = Math.floor((hoy - fechaInicio) / (1000 * 60 * 60 * 24));
            document.getElementById('dias').innerText = dias;
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        function superCorazones() {
            for (let i = 0; i < 50; i++) { setTimeout(createHeart, i * 50); }
            document.getElementById('miModal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('miModal').style.display = 'none';
        }
    </script>
</body>
</html>
